<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruixiang Jiang | Phd Candidate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sixtyfour&display=swap" rel="stylesheet">

    <style>
        /* Optimized CSS */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Sixtyfour', sans-serif;
            color: white;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            min-height: 100vh;
            padding: 140px;
            box-sizing: border-box;
            font-variation-settings: "BLED" 0, "SCAN" -20;
            /* GPU acceleration */
            will-change: transform;

            /* Disable text selection */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;

            /* Disable iOS touch callout */
            -webkit-touch-callout: none;

            /* Disable highlighting */
            -webkit-tap-highlight-color: transparent;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* GPU acceleration for canvas */
            will-change: contents;
            filter: blur(0.1px);
        }

        .text-container {
            position: relative;
            z-index: 2;
            width: 1000px;
            max-width: 90vw;
            text-align: right;
            /* GPU acceleration */
            will-change: transform;
            /* Additional text selection prevention */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .text-panel {
            position: relative;
            display: inline-block;
            max-width: 100%;
            padding: clamp(20px, 2.2vw, 34px) clamp(22px, 2.8vw, 42px);
            border-radius: clamp(22px, 3vw, 34px);
            overflow: visible;
            isolation: isolate;
        }

        .text-panel::before {
            content: '';
            position: absolute;
            inset: -10px;
            z-index: -1;
            border-radius: clamp(28px, 3.8vw, 42px);
            background: rgba(96, 96, 96, 0.08);
            backdrop-filter: blur(7px);
            -webkit-backdrop-filter: blur(7px);
            mask-image: radial-gradient(ellipse at center,
                    rgba(0, 0, 0, 1) 0%,
                    rgba(0, 0, 0, 0.88) 48%,
                    rgba(0, 0, 0, 0.52) 72%,
                    rgba(0, 0, 0, 0.14) 88%,
                    transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse at center,
                    rgba(0, 0, 0, 1) 0%,
                    rgba(0, 0, 0, 0.88) 48%,
                    rgba(0, 0, 0, 0.52) 72%,
                    rgba(0, 0, 0, 0.14) 88%,
                    transparent 100%);
            filter: blur(5px);
        }

        .title {
            font-size: 76px;
            font-weight: 400;
            margin: 0 0 20px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.1;
            /* Optimized text-shadow - fewer layers for better performance */
            text-shadow:
                0 0 3px rgba(255, 255, 255, 0.9),
                0 0 6px rgba(255, 255, 255, 0.6),
                0 0 12px rgba(255, 255, 255, 0.3),
                0 0 20px rgba(255, 255, 255, 0.15);
        }



        .content {
            font-size: 22px;
            line-height: 1.6;
            font-weight: 300;
            margin: 2;
            letter-spacing: 1.3px;
            /* Optimized text-shadow - fewer layers */
            text-shadow:
                0 0 2px rgba(255, 255, 255, 0.7),
                0 0 6px rgba(255, 255, 255, 0.3),
                0 0 8px rgba(255, 255, 255, 0.1);
        }

        .content a {
            color: white;
            text-decoration: none;
            position: relative;
            display: inline-block;
            overflow: hidden;
            transition: color 0.2s ease-in-out, text-shadow 0.2s ease-in-out;
            /* GPU acceleration for hover effects */
            will-change: color;

            /* Allow selection on links for accessibility, but prevent accidental selection */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;

            /* Better touch targets */
            display: inline-block;
            padding: 2px 2px;
            margin: 0 2px;
        }

        .content a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: white;
            transition: height 0.2s ease-in-out;
            z-index: -1;
            /* GPU acceleration */
            will-change: height;
        }

        .content a:hover {
            color: black;
            text-shadow: none;
        }

        .content a:hover::before {
            height: 100%;
        }

        .separator {
            display: inline-block;
            vertical-align: middle;
            margin: 0 0.2em;
            line-height: 1;
            transform: translateY(-8px);
        }

        .interaction-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            z-index: 3;
            text-align: center;
            animation: fadeInOut 4s ease-in-out infinite;
            font-family: Arial, sans-serif;
        }

        @keyframes fadeInOut {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.7;
            }
        }

        /* iPhone landscape mode */
        @media (min-width: 769px) and (max-width: 850px) {
            body {
                padding: 60px 40px;
                align-items: flex-end;
                /* Bottom aligned like desktop */
                justify-content: flex-end;
                /* Right aligned like desktop */
            }

            .text-container {
                width: 100%;
                max-width: 500px;
                /* Wider container for landscape */
                text-align: right;
                /* Right-aligned text */
            }

            .text-panel {
                padding: 18px 22px;
                border-radius: 24px;
            }

            .text-panel::before {
                inset: -8px;
                border-radius: 30px;
            }

            .title {
                font-size: 48px;
                /* Larger than mobile, smaller than desktop */
                margin: 0 0 20px 0;
                line-height: 1.1;
                letter-spacing: 0.8px;
            }

            .content {
                font-size: 18px;
                /* Larger than mobile */
                line-height: 1.6;
                letter-spacing: 1.0px;
            }

            /* Keep the text shadows for visibility */
            .title {
                text-shadow:
                    0 0 2px rgba(255, 255, 255, 0.9),
                    0 0 8px rgba(255, 255, 255, 0.4),
                    0 0 12px rgba(255, 255, 255, 0.2);
            }

            .content {
                text-shadow:
                    0 0 2px rgba(255, 255, 255, 0.7),
                    0 0 4px rgba(255, 255, 255, 0.3);
            }

            .separator {
                margin: 0 1em;
                transform: translateY(-4px);
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 40px 20px;
                align-items: center;
                justify-content: center;
            }

            .content div {
                margin-bottom: 10px;
            }

            .text-container {
                width: 100%;
                max-width: 320px;
                /* Limit container width */
                text-align: center;
            }

            .text-panel {
                width: 100%;
                padding: 18px 16px;
                border-radius: 22px;
            }

            .text-panel::before {
                inset: -7px;
                border-radius: 26px;
                background: rgba(96, 96, 96, 0.09);
                backdrop-filter: blur(6px);
                -webkit-backdrop-filter: blur(6px);
                filter: blur(4px);
            }

            .title {
                font-size: 34px;
                /* Much smaller than current 48px */
                margin: 0 0 15px 0;
                line-height: 1.1;
                letter-spacing: 0.6px;
            }

            .content {
                font-size: 14px;
                /* Smaller than current 18px */
                line-height: 1.4;
                letter-spacing: 0.6px;
            }

            .content br+* {
                margin-top: 8px;
            }

            /* Keep the text shadows for visibility */
            .title {
                text-shadow:
                    0 0 2px rgba(255, 255, 255, 0.9),
                    0 0 8px rgba(255, 255, 255, 0.4);
            }

            .content {
                text-shadow:
                    0 0 2px rgba(255, 255, 255, 0.7),
                    0 0 4px rgba(255, 255, 255, 0.3);
            }

            .separator {
                margin: 0 0.2em;
                transform: translateY(-3px);
            }

            canvas {
                filter: blur(0.4px);
                /* Slight blur to reduce grain harshness */
                opacity: 0.75;
                /* Slightly reduce background intensity */
            }
        }


        /* For very small phones */
        @media (max-width: 400px) {
            .text-container {
                max-width: 300px;
            }

            .text-panel {
                padding: 16px 14px;
                border-radius: 20px;
            }

            .text-panel::before {
                inset: -6px;
                border-radius: 22px;
            }

            .title {
                font-size: 34px;
                line-height: 1.1;
                text-shadow:
                    0 0 3px rgba(255, 255, 255, 0.9),
                    /* Stronger white glow */
                    0 0 6px rgba(255, 255, 255, 0.6),
                    0 0 12px rgba(255, 255, 255, 0.4),
                    0 0 20px rgba(255, 255, 255, 0.2);
                /* Even smaller for tiny screens */
            }

            .content {
                font-size: 13px;
                letter-spacing: 0.6px;
                text-shadow:
                    0 0 2px rgba(255, 255, 255, 0.9),
                    /* Stronger contrast */
                    0 0 5px rgba(255, 255, 255, 0.5),
                    0 0 8px rgba(255, 255, 255, 0.2);

            }
        }

        @media (max-width: 768px) {
            body {
                padding: 40px 20px;
                align-items: center;
                justify-content: center;
            }

            .content div {
                margin-bottom: 10px;
            }

            .text-container {
                width: 100%;
                max-width: 320px;
                /* Limit container width */
                text-align: center;
            }

            .title {
                font-size: 34px;
                /* Much smaller than current 48px */
                margin: 0 0 15px 0;
                line-height: 1.1;
                letter-spacing: 0.6px;
            }

            .content {
                font-size: 14px;
                /* Smaller than current 18px */
                line-height: 1.4;
                letter-spacing: 0.6px;
            }

            .content br+* {
                margin-top: 8px;
            }

            /* Keep the text shadows for visibility */
            .title {
                text-shadow:
                    0 0 2px rgba(255, 255, 255, 0.9),
                    0 0 8px rgba(255, 255, 255, 0.4);
            }

            .content {
                text-shadow:
                    0 0 2px rgba(255, 255, 255, 0.7),
                    0 0 4px rgba(255, 255, 255, 0.3);
            }

            .separator {
                margin: 0 0.2em;
                transform: translateY(-3px);
            }

            canvas {
                filter: blur(0.4px);
                /* Slight blur to reduce grain harshness */
                opacity: 0.75;
                /* Slightly reduce background intensity */
            }
        }


        /* For very small phones */
        @media (max-width: 400px) {
            .text-container {
                max-width: 300px;
            }

            .title {
                font-size: 34px;
                line-height: 1.1;
                text-shadow:
                    0 0 3px rgba(255, 255, 255, 0.9),
                    /* Stronger white glow */
                    0 0 6px rgba(255, 255, 255, 0.6),
                    0 0 12px rgba(255, 255, 255, 0.4),
                    0 0 20px rgba(255, 255, 255, 0.2);
                /* Even smaller for tiny screens */
            }

            .content {
                font-size: 13px;
                letter-spacing: 0.6px;
                text-shadow:
                    0 0 2px rgba(255, 255, 255, 0.9),
                    /* Stronger contrast */
                    0 0 5px rgba(255, 255, 255, 0.5),
                    0 0 8px rgba(255, 255, 255, 0.2);

            }
        }

        /* High DPI displays */
        @media (-webkit-min-device-pixel-ratio: 2),
        (min-resolution: 192dpi) {

            .title,
            .content {
                text-shadow:
                    0 0 2px rgba(255, 255, 255, 0.9),
                    0 0 4px rgba(255, 255, 255, 0.6),
                    0 0 8px rgba(255, 255, 255, 0.3);
            }
        }
    </style>
</head>

<body data-background-theme="mono-mist">
    <canvas id="canvas"></canvas>

    <div class="text-container">
        <div class="text-panel">
            <div class="title">RUIXIANG<br>JIANG</div>
            <div class="content">
                <div>PhD Candidate @ PolyU</div>
                <div>Computational Aesthetics & Generative Art</div>
                <div>
                    <a href="research.html">Publication</a>
                    <span class="separator">/</span>
                    <a href="https://github.com/songrise">Github</a>
                </div>
            </div>
        </div>
    </div>

    <div class="interaction-hint"></div>

    <script src="background-shader.js"></script>
</body>

</html>
